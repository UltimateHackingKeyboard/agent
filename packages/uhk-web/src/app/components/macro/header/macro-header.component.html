<uhk-header>
    <fa-icon [icon]="faPlay"></fa-icon>
    <auto-grow-input [ngModel]="macro.name"
                     maxParentWidthPercent="0.8"
                     [selectAfterInit]="isNew"
                     (ngModelChange)="editMacroName($event)"></auto-grow-input>
    <fa-icon [icon]="faTrash"
             class="macro__remove float-end"
             ngbTooltip="Delete macro"
             tooltipClass="tooltip-nowrap"
             placement="bottom-right"
             (click)="removeMacro()"></fa-icon>
    <fa-icon [icon]="faCopy"
             class="macro__duplicate float-end"
             [class.disabled]="maxMacroCountReached"
             [ngbTooltip]="maxMacroCountReached ? maxAllowedMacrosTooltip : 'Duplicate macro'"
             tooltipClass="tooltip-nowrap"
             placement="bottom-right"
             (click)="duplicateMacro()"></fa-icon>
</uhk-header>
<div *ngIf="assignments.length" class="macro__assignments">
    <span class="macro__assignments-label">Used on:</span>
    <ng-container *ngFor="let assignment of assignments; let last = last">
        <a class="macro__assignment-link"
           [routerLink]="['/keymap', assignment.keymapAbbreviation]"
           [queryParams]="getKeymapQueryParams(assignment)">{{ assignment.label }}</a><span *ngIf="!last" class="macro__assignment-separator">, </span>
    </ng-container>
</div>
