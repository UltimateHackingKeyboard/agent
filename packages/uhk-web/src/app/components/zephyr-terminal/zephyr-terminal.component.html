<div class="zephyr-term-container">
    <div class="zephyr-term-wrapper">
        <div #terminal
             class="zephyr-terminal"
             (ngxResize)="onResized()"
        ></div>
    </div>
    <div class="copy-container-wrapper">
        <div class="copy-container">
            <span ngbTooltip="Copy to clipboard"
                  container="body"
                  placement="top">
                <fa-icon [icon]="faCopy"
                         size="2x"
                         ngxClipboard
                         [cbContent]="getClipboardContent()"
                />
            </span>
        </div>
    </div>
</div>
